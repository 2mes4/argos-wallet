version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: argoswallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  server:
    build:
      context: ./platform
      dockerfile: Dockerfile
    target: builder
    command: go run ./cmd/server
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres:5432/argoswallet?sslmode=disable
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root
      SERVER_PORT: "8080"
      RUN_MIGRATIONS: "true"
      LOG_LEVEL: debug
    volumes:
      - ./platform:/app

  worker:
    build:
      context: ./platform
      dockerfile: Dockerfile
    target: builder
    command: go run ./cmd/worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres:5432/argoswallet?sslmode=disable
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root
    volumes:
      - ./platform:/app

volumes:
  pgdata:
