name: Platform CI

on:
  push:
    paths:
      - 'platform/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'platform/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: argoswallet_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.61.0

      - name: Download dependencies
        working-directory: platform
        run: go mod download

      - name: Lint
        working-directory: platform
        run: golangci-lint run ./...

      - name: Test
        working-directory: platform
        run: go test ./... -v -count=1
        env:
          DATABASE_URL: postgres://postgres:dev@localhost:5432/argoswallet_test?sslmode=disable

      - name: Integration tests
        working-directory: tests/integration
        run: go test -v -count=1
        env:
          DATABASE_URL: postgres://postgres:dev@localhost:5432/argoswallet_test?sslmode=disable

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: platform
          push: false
          tags: ericmora/argos-wallet:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
