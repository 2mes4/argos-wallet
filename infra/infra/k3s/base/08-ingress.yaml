apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwallet-ingress
  namespace: open-wallet
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  rules:
    - host: api.openwallet.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 80
  tls:
    - hosts:
        - api.openwallet.dev
      secretName: openwallet-tls
