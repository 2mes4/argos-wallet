apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: open-wallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: openwallet/server:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: openwallet-secrets
                  key: database-url
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openwallet-secrets
                  key: vault-token
            - name: FIREBASE_PROJECT_ID
                  valueFrom:
                    secretKeyRef:
                      name: openwallet-secrets
                      key: firebase-project-id
            - name: SERVER_PORT
              value: "8080"
            - name: RUN_MIGRATIONS
              value: "true"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: open-wallet
spec:
  selector:
    app: server
  ports:
    - port: 80
      targetPort: 8080
